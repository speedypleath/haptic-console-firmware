; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = teensy_master

[common]
monitor_speed = 115200
lib_deps = 

[env:teensy_master]
platform = teensy
board = teensy40
framework = arduino
monitor_speed = ${common.monitor_speed}
build_src_filter = 
	+<teensy_master/>

[env:pico_loadcell]
platform = raspberrypi
board = pico
framework = arduino
upload_protocol = picotool
monitor_speed = ${common.monitor_speed}
build_src_filter = 
	+<pico_loadcell/>
build_flags = 
	-D HAPTIC_MODULE_KIND=MODULE_KIND_LOADCELL
	-D HAPTIC_I2C_ADDRESS=0x20
lib_deps = olkal/HX711_ADC@^1.2.12

[env:pico_pressure]
platform = raspberrypi
board = pico
framework = arduino
upload_protocol = picotool
monitor_speed = ${common.monitor_speed}
build_src_filter = 
	+<pico_pressure/>
build_flags = 
	-D HAPTIC_MODULE_KIND=MODULE_KIND_PRESSURE
	-D HAPTIC_I2C_ADDRESS=0x21

[env:pico_encoder]
platform = raspberrypi
board = pico
framework = arduino
upload_protocol = picotool
monitor_speed = ${common.monitor_speed}
build_src_filter =
	+<pico_encoder/>
build_flags =
	-D HAPTIC_MODULE_KIND=MODULE_KIND_ENCODER
	-D HAPTIC_I2C_ADDRESS=0x22

[common_debug]
; Debug probe is a second Pico running picoprobe firmware, wired SWDIO/SWDCLK/GND
; to the target. OpenOCD (system install, on PATH) talks to it over CMSIS-DAPv2
; and exposes a GDB-remote server on debug_port that either PlatformIO's bundled
; GDB or CodeLLDB (via `gdb-remote`, see .vscode/launch.json) can attach to.
debug_tool = custom
debug_port = localhost:3333
debug_server =
	openocd
	-f
	interface/cmsis-dap.cfg
	-f
	target/rp2040.cfg

[env:pico_loadcell_debug]
platform = raspberrypi
board = pico
framework = arduino
upload_protocol = picotool
monitor_speed = ${common.monitor_speed}
build_type = debug
build_src_filter =
	+<pico_loadcell/>
build_flags =
	-D HAPTIC_MODULE_KIND=MODULE_KIND_LOADCELL
	-D HAPTIC_I2C_ADDRESS=0x20
	-D HAPTIC_DEBUG
lib_deps = olkal/HX711_ADC@^1.2.12
debug_tool = ${common_debug.debug_tool}
debug_port = ${common_debug.debug_port}
debug_server = ${common_debug.debug_server}

[env:pico_pressure_debug]
platform = raspberrypi
board = pico
framework = arduino
upload_protocol = picotool
monitor_speed = 115200
monitor_port = /dev/cu.usbmodem*
build_type = debug
build_src_filter =
	+<pico_pressure/>
build_flags =
	-D HAPTIC_MODULE_KIND=MODULE_KIND_PRESSURE
	-D HAPTIC_I2C_ADDRESS=0x21
	-D HAPTIC_DEBUG
	-Og -g3
build_unflags = -Os
debug_tool = ${common_debug.debug_tool}
debug_port = ${common_debug.debug_port}
debug_server = ${common_debug.debug_server}

[env:pico_encoder_debug]
platform = raspberrypi
board = pico
framework = arduino
upload_protocol = picotool
monitor_speed = ${common.monitor_speed}
build_type = debug
build_src_filter =
	+<pico_encoder/>
build_flags =
	-D HAPTIC_MODULE_KIND=MODULE_KIND_ENCODER
	-D HAPTIC_I2C_ADDRESS=0x22
	-D HAPTIC_DEBUG
debug_tool = ${common_debug.debug_tool}
debug_port = ${common_debug.debug_port}
debug_server = ${common_debug.debug_server}

; --- pico-sdk validation test for pico_pressure ---
; Bare-metal port (no RTOS, no blocking USBSerial) to test whether SWD/GDB
; debugging is materially more reliable than under Arduino-mbed. See
; lib/HapticProtocol and PicoModuleCommon.h for the Arduino equivalent this
; mirrors. Uses the maxgerhardt fork since the official raspberrypi platform
; only supports framework=arduino.
; pico_bootsel_via_double_reset is pico-sdk's own double-tap-reset-to-bootloader
; feature (a constructor in pico_stdlib's default dependency chain, distinct
; from but equivalent to Arduino-mbed's double_tap_usb_boot.cpp) -- it was
; interfering with our automated SWD reset cycles the same way the Arduino
; version did. lib_ignore doesn't remove it (it's framework-injected, not
; LDF-discovered), so the window is instead zeroed via build_flags -- the
; constructor still runs but can never trigger.
[env:pico_pressure_sdk]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git#develop
board = pico
framework = picosdk
upload_protocol = picotool
monitor_speed = ${common.monitor_speed}
build_src_filter =
	+<pico_pressure_sdk/>
build_flags =
	-D HAPTIC_MODULE_KIND=MODULE_KIND_PRESSURE
	-D HAPTIC_I2C_ADDRESS=0x21
	-D PICO_BOOTSEL_VIA_DOUBLE_RESET_TIMEOUT_MS=0

[env:pico_pressure_sdk_debug]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git#develop
board = pico
framework = picosdk
upload_protocol = picotool
monitor_speed = ${common.monitor_speed}
build_type = debug
build_src_filter =
	+<pico_pressure_sdk/>
build_flags =
	-D HAPTIC_MODULE_KIND=MODULE_KIND_PRESSURE
	-D HAPTIC_I2C_ADDRESS=0x21
	-D HAPTIC_DEBUG
	-D PICO_BOOTSEL_VIA_DOUBLE_RESET_TIMEOUT_MS=0
debug_tool = ${common_debug.debug_tool}
debug_port = ${common_debug.debug_port}
debug_server = ${common_debug.debug_server}